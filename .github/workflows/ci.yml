name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Portal Android unit tests
        run: |
          ./gradlew testOssDebugUnitTest \
            --tests org.connectbot.portal.PortalHubRepositoryTest \
            --tests org.connectbot.portal.PortalHubContractTest \
            --tests org.connectbot.portal.PortalVaultCryptoTest \
            --rerun-tasks
