name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out Portal Hub contracts
        uses: actions/checkout@v4
        with:
          repository: DigitalPals/portal-hub
          path: portal-hub
          sparse-checkout: contracts

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Portal Android unit tests
        env:
          PORTAL_HUB_CONTRACT_DIR: ${{ github.workspace }}/portal-hub/contracts/portal-hub/v2
          REQUIRE_PORTAL_HUB_CONTRACTS: "true"
        run: ./gradlew testOssDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleOssDebug
